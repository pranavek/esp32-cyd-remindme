; ESP32 CYD RemindMe — habit reminder device with Sheets/ntfy backend
; Target: ESP32-2432S028R (dual-USB, ST7789 panel)
;
; Both firmware and the LittleFS image must be uploaded:
;   pio run -t upload
;   pio run -t uploadfs
;
; The web UI (data/web/), reminder icons (data/icons/), and smooth fonts
; (data/fonts/) all live in LittleFS — without uploadfs, the device boots
; but the UI is unstyled and icons render as text fallbacks.

[env:esp32-cyd]
platform   = espressif32
framework  = arduino
board      = esp32dev
monitor_speed = 250000

; LittleFS partition; default.csv gives ~1.5 MB user data area
board_build.filesystem = littlefs
board_build.partitions = default.csv

lib_deps =
    bodmer/TFT_eSPI @ ^2.4.3
    paulstoffregen/XPT2046_Touchscreen
    bblanchon/ArduinoJson @ ^7.0.0
    tzapu/WiFiManager @ ^2.0.17
    ; ESPAsyncWebServer + AsyncTCP — using the actively-maintained ESP32Async fork.
    ; If the build fails to resolve these, replace with the me-no-dev forks
    ; (older but still functional with espressif32@<6.5).
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/ESP32Async/ESPAsyncWebServer.git

build_flags =
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_RGB_ORDER=0          ; ST7789 dual-USB CYD panel BGR fix (yellow != cyan)
    -DTFT_INVERSION_OFF        ; black background, not white
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DTOUCH_CS=33
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
    -DUSE_HSPI_PORT
    -DFW_VERSION=\"0.1.0\"
